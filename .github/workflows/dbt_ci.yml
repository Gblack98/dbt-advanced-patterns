name: dbt CI + Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install dbt-core==1.9.9 dbt-duckdb==1.9.6

      - name: Créer profiles.yml pour CI
        env:
          PROFILES_CONTENT: |
            dbt_fintech:
              target: ci
              outputs:
                ci:
                  type: duckdb
                  path: 'ci.duckdb'
                  threads: 1
        run: |
          mkdir -p dbt_fintech
          echo "$PROFILES_CONTENT" > dbt_fintech/profiles.yml

      - name: Télécharger le manifest de référence (si existant)
        uses: actions/download-artifact@v4
        with:
          name: dbt-manifest
          path: dbt_fintech/prod-manifest/
        continue-on-error: true

      - name: dbt seed
        working-directory: dbt_fintech
        run: dbt seed
        env:
          DBT_PROFILES_DIR: .

      - name: dbt build
        working-directory: dbt_fintech
        run: |
          if [ -f prod-manifest/manifest.json ]; then
            echo "Manifest trouvé — run slim CI"
            dbt build \
              --select state:modified+ \
              --defer \
              --state prod-manifest/
          else
            echo "Pas de manifest — run complet (premier run)"
            dbt build
          fi
        env:
          DBT_PROFILES_DIR: .

      - name: dbt docs generate
        working-directory: dbt_fintech
        run: dbt docs generate
        env:
          DBT_PROFILES_DIR: .

      - name: Uploader le manifest pour le prochain run
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dbt-manifest
          path: dbt_fintech/target/manifest.json
          retention-days: 30

      - name: Setup Pages
        uses: actions/configure-pages@v4
        if: github.ref == 'refs/heads/main'

      - name: Upload docs to Pages
        uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: dbt_fintech/target/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: github.ref == 'refs/heads/main'
